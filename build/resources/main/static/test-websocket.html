<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<h1>WebSocket Test</h1>
<button onclick="connect()">Connect</button>
<button onclick="uploadFile()">Upload File</button>
<div id="messages"></div>

<script>
    let stompClient = null;
    let uploadId = null;

    function connect() {
        const socket = new SockJS('http://localhost:8080/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            document.getElementById('messages').innerHTML += '<p>Connected!</p>';
        });
    }

    function uploadFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = async function(e) {
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('http://localhost:8080/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            uploadId = data.uploadId;

            document.getElementById('messages').innerHTML +=
                `<p>Upload started: ${uploadId}</p>`;

            // Подписываемся на прогресс
            stompClient.subscribe(`/topic/upload/${uploadId}`, function(message) {
                const progress = JSON.parse(message.body);
                document.getElementById('messages').innerHTML +=
                    `<p>${progress.phase}: ${progress.percent}% - ${progress.message}</p>`;

                if (progress.phase === 'COMPLETED') {
                    document.getElementById('messages').innerHTML +=
                        `<p style="color:green">✅ ${progress.message}</p>`;
                }
            });
        };
        input.click();
    }
</script>
</body>
</html>
