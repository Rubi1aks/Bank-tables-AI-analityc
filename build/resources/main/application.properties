server.port=8081

# H2 file-based database (сохраняется в папку ./data)
spring.datasource.url=jdbc:h2:file:./data/university_db;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (админка в браузере)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Чтобы Jackson правильно сериализовал даты
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.com.example.universityanalytics=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n